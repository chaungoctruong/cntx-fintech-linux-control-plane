# LEGACY / LOCAL HOST-LEVEL EXAMPLE
# File nay duoc giu lai de tham khao van hanh tren host hien tai.
# Source of truth handoff cho single-node control plane la `config/nginx-spider.conf`.
# For high throughput (20k users): in main nginx.conf set events { worker_connections 16384; }
# Upstream cho control-plane API cluster (PM2 instances 8001..8004)
upstream spider_api {
    least_conn;
    keepalive 64;
    server 127.0.0.1:8002 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:8003 max_fails=3 fail_timeout=10s;
}
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}
server {
    listen 80;
    server_name _ localhost 127.0.0.1;
    keepalive_requests 1000;

    # 1. Triệt tiêu lỗi 404 rác từ favicon và robots
    location = /favicon.ico { access_log off; log_not_found off; return 204; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # 2. Phục vụ trực tiếp file tĩnh siêu tốc
    location /static/ {
        alias /root/spider-ai/backend_ai/backend/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # 3. QUAN TRỌNG: Đón luồng Webhook Telegram (Đẩy thẳng vào Bot đang chạy chung cổng 8001)
    # Tự động cắt đuôi /miniapp để khớp với code của Bot
    location /miniapp/telegram/webhook {
        proxy_pass http://127.0.0.1:8081/telegram/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # 4. Chuyển các Request Web/App còn lại vào Backend (control-plane API cluster)
    location / {
        proxy_pass http://spider_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Upgrade $http_upgrade;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
    }
}
