# Local/dev compose only. Production deployment uses PM2/HA samples under
# `ecosystem.config.js` and `ops/ha/`; do not treat this file as a production
# Postgres/Redis/security baseline.
services:
  hubbot:
    build:
      context: .
      dockerfile: hubbot/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./hubbot:/app/hubbot
      - ./logs:/app/logs
    ports:
      - "8081:8081"
    depends_on:
      - db
      - redis

  spider-app:
    build:
      context: .
      dockerfile: backend_ai/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    # Static export Next.js build local — backend mount /_next từ thư mục này.
    # Build bằng: docker run --rm -v "$PWD/frontend-v2:/app" -w /app
    #   -e NEXT_PUBLIC_BACKEND_URL=<https-tunnel> node:20-bookworm-slim
    #   bash -c "npm install && npm run build"
    volumes:
      - ./frontend-v2/out:/app/frontend-v2/out:ro
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LOCAL_POSTGRES_DB:-spider_dev}
      POSTGRES_USER: ${LOCAL_POSTGRES_USER:-spider_dev}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:-spider_dev_only_change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${LOCAL_REDIS_PASSWORD:?set LOCAL_REDIS_PASSWORD in .env}
    # Product-style single-node Redis: auth + AOF persistence. Full production
    # should still move Redis to managed/HA storage before real-money traffic.
    command: sh -c 'exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"'
    ports:
      # Windows runner reaches this through SSH tunnel:
      # ssh -p 24700 -N -L 6380:127.0.0.1:6380 root@<backend-host>
      - "${REDIS_HOST_BIND:-127.0.0.1}:${REDIS_HOST_PORT:-6380}:6379"
      # Direct Windows runner test endpoint. Keep this bound to the backend
      # public IP and restrict source IP in DOCKER-USER/firewall rules.
      - "${REDIS_PUBLIC_HOST_BIND:-127.0.0.1}:${REDIS_PUBLIC_HOST_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping 2>/dev/null | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
  redisdata:
