# Docker Compose runtime for this Linux control plane. Keep public exposure
# minimal: application HTTP is published explicitly, Redis is loopback-only for
# SSH tunnel use, and internal services talk over the Compose network.
#
# Env file selection (gitignored .env*):
#   prod (default): docker compose up -d            → reads .env
#   dev:            ENV_FILE=.env.dev docker compose up -d
#                   or use the helper: ops/compose-dev.sh up -d
# Both LOCAL_* substitution vars and container env_file resolve from the same
# file, so swapping ENV_FILE swaps everything atomically.
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"

services:
  hubbot:
    build:
      context: .
      dockerfile: hubbot/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    env_file:
      - ${ENV_FILE:-.env}
    volumes:
      - ./hubbot:/app/hubbot
      - ./logs:/app/logs
    depends_on:
      - db
      - redis

  cntx-lab:
    build:
      context: .
      dockerfile: backend_ai/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    env_file:
      - ${ENV_FILE:-.env}
    ports:
      - "8001:8001"
    # Static export Next.js build local — backend mount /_next từ thư mục này.
    # Build bằng: docker run --rm -v "$PWD/frontend-v2:/app" -w /app
    #   -e NEXT_PUBLIC_BACKEND_URL=<https-tunnel> node:20-bookworm-slim
    #   bash -c "npm install && npm run build"
    volumes:
      - ./frontend-v2:/app/frontend-v2:ro
      - ./logs:/app/logs
    networks:
      default:
        aliases:
          # Backward-compatible alias while old scripts/env files are phased out.
          - spider-app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${LOCAL_POSTGRES_DB:-spider_dev}
      POSTGRES_USER: ${LOCAL_POSTGRES_USER:-spider_dev}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:-spider_dev_only_change_me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    environment:
      REDIS_PASSWORD: ${LOCAL_REDIS_PASSWORD:?set LOCAL_REDIS_PASSWORD in your env file}
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-1024mb}
      REDIS_MAXMEMORY_POLICY: ${REDIS_MAXMEMORY_POLICY:-noeviction}
    # Product-style single-node Redis: auth + AOF persistence. Full production
    # should still move Redis to managed/HA storage before real-money traffic.
    command: >
      sh -c 'exec redis-server
      --appendonly yes
      --requirepass "$$REDIS_PASSWORD"
      --maxmemory "$$REDIS_MAXMEMORY"
      --maxmemory-policy "$$REDIS_MAXMEMORY_POLICY"'
    ports:
      # Windows runner reaches this through SSH tunnel:
      # ssh -p 24700 -N -L 6380:127.0.0.1:6380 root@<backend-host>
      - "${REDIS_HOST_BIND:-127.0.0.1}:${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping 2>/dev/null | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  token-bot-api:
    build:
      context: ./token-bot
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    env_file:
      - ./token-bot/.env
    environment:
      HOST: 0.0.0.0
      PORT: 8090
      SOURCE_BOT_DIR: /bot-trading
      ENCRYPTED_BOT_DIR: /app/var/encrypted
      DATABASE_URL: postgresql+psycopg2://${LOCAL_POSTGRES_USER:-spider_dev}:${LOCAL_POSTGRES_PASSWORD:-spider_dev_only_change_me}@db:5432/${LOCAL_POSTGRES_DB:-spider_dev}
      REDIS_URL: redis://:${LOCAL_REDIS_PASSWORD:?set LOCAL_REDIS_PASSWORD}@redis:6379/0
      BACKEND_URL: http://cntx-lab:8001
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8090"]
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - ./token-bot/var:/app/var
      - ./bot-trading:/bot-trading:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      cntx-lab:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  token-bot-tg:
    build:
      context: ./token-bot
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    env_file:
      - ./token-bot/.env
    environment:
      SOURCE_BOT_DIR: /bot-trading
      ENCRYPTED_BOT_DIR: /app/var/encrypted
      DATABASE_URL: postgresql+psycopg2://${LOCAL_POSTGRES_USER:-spider_dev}:${LOCAL_POSTGRES_PASSWORD:-spider_dev_only_change_me}@db:5432/${LOCAL_POSTGRES_DB:-spider_dev}
      REDIS_URL: redis://:${LOCAL_REDIS_PASSWORD:?set LOCAL_REDIS_PASSWORD}@redis:6379/0
      BACKEND_URL: http://cntx-lab:8001
    command: ["python", "scripts/run_tg_bot.py"]
    volumes:
      - ./token-bot/var:/app/var
      - ./bot-trading:/bot-trading:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      cntx-lab:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
