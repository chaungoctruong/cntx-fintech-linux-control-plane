# CANONICAL SINGLE-NODE CONTROL-PLANE NGINX SAMPLE
# File nay la artifact handoff/release uu tien cho single-node Linux control plane.
# Root `nginx.conf` chi con duoc giu nhu local/legacy host example.
# CẤU HÌNH CHUẨN - TỐI ƯU & TRƠN TRU
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}

map "$request_method $uri $status" $spider_access_loggable {
    default 1;
    ~^GET\ /ready\ [23][0-9][0-9]$ 0;
    ~^GET\ /health\ [23][0-9][0-9]$ 0;
    ~^GET\ /api/v2/bots\ [23][0-9][0-9]$ 0;
    ~^GET\ /api/v2/mini/bots\ [23][0-9][0-9]$ 0;
    ~^GET\ /api/v2/miniapp/access\ [23][0-9][0-9]$ 0;
    ~^GET\ /api/v2/miniapp/accounts\ [23][0-9][0-9]$ 0;
    ~^GET\ /api/v2/miniapp/dashboard\ [23][0-9][0-9]$ 0;
    ~^GET\ /api/v2/miniapp/deployments\ [23][0-9][0-9]$ 0;
    ~^GET\ /api/v2/miniapp/terms/status\ [23][0-9][0-9]$ 0;
    ~^GET\ /api/v2/miniapp/bot-token/entitlements\ [23][0-9][0-9]$ 0;
    ~^GET\ /api/v2/wallet/info\ [23][0-9][0-9]$ 0;
    ~^GET\ /api/v2/wallet/transactions\ [23][0-9][0-9]$ 0;
    ~^GET\ /api/v2/system/ops-summary\ [23][0-9][0-9]$ 0;
    ~^GET\ /api/v2/system/runner-readiness\ [23][0-9][0-9]$ 0;
    ~^GET\ /api/v2/accounts/verifications/[^/]+\ [23][0-9][0-9]$ 0;
    ~^POST\ /api/v2/runner/heartbeat\ [23][0-9][0-9]$ 0;
    ~^POST\ /api/v2/runner/events\ [23][0-9][0-9]$ 0;
    ~^POST\ /api/v2/runner/account-verifications/result\ [23][0-9][0-9]$ 0;
    ~^POST\ /api/v2/runner/commands/[^/]+/delivery\ [23][0-9][0-9]$ 0;
}

upstream spider_backend {
    least_conn;
    keepalive 64;
    server 127.0.0.1:8002 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:8003 max_fails=3 fail_timeout=10s;
}

server {
    listen 80 default_server;
    server_name _ localhost 127.0.0.1;

    # Gửi toàn bộ yêu cầu tới Backend (Backend sẽ tự lo Frontend & API)
    location / {
        proxy_pass http://spider_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Upgrade $http_upgrade;
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        
        # Timeout cho các tác vụ lâu
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Metrics are ops-only. Keep public internet blocked by default.
    # To enable Prometheus, add its private IP here, reload Nginx, and keep
    # the scrape path on the internal network only:
    #   allow 10.40.20.10;
    location = /metrics {
        allow 127.0.0.1;
        allow ::1;
        deny all;

        proxy_pass http://spider_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # Logs
    access_log /root/spider-ai/logs/nginx-access.log combined if=$spider_access_loggable;
    error_log /root/spider-ai/logs/nginx-error.log;
}
