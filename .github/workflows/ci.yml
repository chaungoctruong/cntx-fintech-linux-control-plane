name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static-guards:
    name: Static Guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: git diff whitespace check
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          base="${PR_BASE_SHA:-$PUSH_BEFORE_SHA}"
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            base="$(git rev-list --max-parents=0 HEAD)"
          fi
          git diff --check "$base" HEAD

      - name: basic secret scan
        shell: python
        run: |
          from pathlib import Path
          import re
          import subprocess
          import sys

          allow_suffixes = (
              ".example",
              ".sample",
              ".template",
              "package-lock.json",
          )
          skip_prefixes = (
              "ops/artifacts/",
              "ops/archives/",
              "frontend-v2/package-lock.json",
          )
          patterns = [
              ("github_token", re.compile(r"(ghp|github_pat)_[A-Za-z0-9_]{20,}")),
              ("telegram_bot_token", re.compile(r"\b\d{8,12}:[A-Za-z0-9_-]{30,}\b")),
              ("private_key", re.compile(r"-----BEGIN (?:RSA |EC |OPENSSH |)PRIVATE KEY-----")),
              ("high_entropy_assignment", re.compile(r"(?i)\b(secret|api[_-]?key|token|password)\b\s*[:=]\s*['\"][^'\"]{24,}['\"]")),
          ]

          tracked = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          failures = []
          for item in tracked:
              path = Path(item)
              if any(item.startswith(prefix) for prefix in skip_prefixes):
                  continue
              if any(item.endswith(suffix) for suffix in allow_suffixes):
                  continue
              if not path.is_file():
                  continue
              try:
                  data = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              for label, pattern in patterns:
                  match = pattern.search(data)
                  if match:
                      line = data[: match.start()].count("\n") + 1
                      failures.append(f"{item}:{line}: {label}")
                      break

          if failures:
              print("Secret-like patterns found:")
              print("\n".join(failures))
              sys.exit(1)

      - name: control-plane file size guard
        shell: python
        run: |
          from pathlib import Path
          import sys

          limits = {
              "backend_ai/backend/app/repositories/control_plane/repository.py": 2500,
              "backend_ai/backend/app/repositories/control_plane/support.py": 1000,
              "backend_ai/backend/app/repositories/control_plane/mixins/users.py": 400,
              "backend_ai/backend/app/repositories/control_plane/mixins/accounts.py": 900,
              "backend_ai/backend/app/repositories/control_plane/mixins/verification.py": 900,
              "backend_ai/backend/app/repositories/control_plane/mixins/deployments.py": 1400,
              "backend_ai/backend/app/repositories/control_plane/mixins/commands.py": 1400,
              "backend_ai/backend/app/repositories/control_plane/mixins/runners_slots.py": 3000,
          }

          failures = []
          for rel_path, max_lines in limits.items():
              path = Path(rel_path)
              if not path.exists():
                  failures.append(f"{rel_path}: missing file (expected <= {max_lines} lines)")
                  continue
              line_count = sum(1 for _ in path.open("r", encoding="utf-8"))
              if line_count > max_lines:
                  failures.append(f"{rel_path}: {line_count} lines (limit {max_lines})")

          if failures:
              print("Control-plane size guard failed:")
              print("\n".join(failures))
              sys.exit(1)

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend_ai/backend/requirements.txt

      - name: run backend control-plane tests
        env:
          PYTHONPATH: backend_ai/backend:.
        run: |
          python -m unittest discover -s backend_ai/backend/tests -p 'test_control_plane*.py'
          python -m unittest \
            backend_ai.backend.tests.test_settings_prod_guard \
            backend_ai.backend.tests.test_api_v2_system_healthz \
            backend_ai.backend.tests.test_control_plane_metrics \
            backend_ai.backend.tests.test_command_delivery_reconciler \
            backend_ai.backend.tests.test_migration_baseline \
            backend_ai.backend.tests.test_redis_streams \
            backend_ai.backend.tests.test_runner_contract \
            backend_ai.backend.tests.test_runner_examples_integration \
            backend_ai.backend.tests.test_replay_control_plane_queue \
            backend_ai.backend.tests.test_deployment_trading_config

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-v2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json

      - name: install frontend dependencies
        run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: lint
        run: npm run lint

      - name: build
        run: npm run build
